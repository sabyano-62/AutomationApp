name: Generate Android Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=AutomationApp, OU=Dev, O=AutomationApp, L=City, ST=State, C=US"

      - name: Base64 encode keystore
        run: base64 -w0 release.keystore > release.keystore.b64

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: release.keystore

      - name: Print instructions
        run: |
          echo "=== Keystore generated ==="
          echo "Go to: Settings → Secrets and variables → Actions"
          echo "Add these secrets:"
          echo "  ANDROID_KEYSTORE_BASE64 = $(cat release.keystore.b64)"
          echo "  ANDROID_KEYSTORE_PASS = android"
          echo "  ANDROID_KEY_ALIAS = release"
          echo "  ANDROID_KEY_PASS = android"
